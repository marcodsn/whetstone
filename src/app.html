<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&family=Bitter:ital,opsz,wght@0,11..18,400;0,11..18,600;1,11..18,400&display=swap"
			rel="stylesheet"
		/>
		<script>
			// Apply theme before first paint to avoid flash
			(function () {
				try {
					var t = localStorage.getItem('scope.theme.v1');
					if (!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
					document.documentElement.dataset.theme = t;
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
